<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

@page {
    size: A4 landscape;
    margin: 10mm;
}

body{
    font-family: Arial;
    font-size: 11px;
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    border:1px solid #000;
    padding:4px;
}

th{
    background:#efefef;
}

.title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
    font-size:16px;
}

</style>

</head>

<body>

<div class="title">
    {{area.name}} ({{ total }} DOCUMENTOS)
</div>

<table>

    <thead>
        <tr>
            <th>Trámite</th>
            <th>Documento</th>
            <th>Procedencia</th>
            <th>Asunto</th>
        </tr>
    </thead>

    <tbody>

        {% for item in flows %}

        <tr>

            <td>
                {{ item.procedure.code }}
            </td>

            <td>
                {{ item.procedure.document_type.name }}
                {{ item.procedure.document_number|default:'' }}
            </td>

            <td>
                {{ item.procedure.sender_name }}
            </td>

            <td>
                {{ item.procedure.subject }}
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

</body>
</html>
